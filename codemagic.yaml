workflows:
  nexus-debug-build:
    name: NexusLauncher Debug Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build NexusLauncher APK
        script: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle :app_pojavlauncher:assembleDebug
    artifacts:
      - app_pojavlauncher/build/outputs/apk/**/*.apk
